name: Summer Sound monitor

on:
  schedule:
    - cron: '2/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: summer-sound-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEAL_CHAT_IDS: 6364959649,6164517954
          ERROR_CHAT_IDS: 6364959649
        run: npm run check

      - name: Save monitor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json || true
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push || true
